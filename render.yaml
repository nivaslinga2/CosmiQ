services:
  # Your Web Service (Website)
  - type: web
    name: cosmiq
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: IBM_QUANTUM_TOKEN
        sync: true
