services:
  - type: web
    name: cosmiq
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: IBM_QUANTUM_TOKEN
        value: placeholder_change_me
